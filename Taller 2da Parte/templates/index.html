<!DOCTYPE html>
<html>

<head>
    <title>Lista de tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <h1>Lista de tareas</h1>

    <form method="POST" action="/add">
        <input type="text" name="nombre" placeholder="Escribe una tarea" required>
        <input type="text" name="estado" placeholder="Escribe el estado" required>
        <button type="submit">Agregar</button>
    </form>

    <ul>

        <table class="table">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Estado</th>
                    <th scope="col">Acciones</th>

                </tr>
            </thead>
            <tbody>


                {% for tarea in tareas %}


                <tr>
                    <th scope="row">{{ tarea[0] }}</th>
                    <td>{{ tarea[1] }}</td>
                    <td>{{ tarea[2] }}</td>

                        <div>
                            <form method="POST" action="/update/{{ tarea[0] }}">
                                <input type="text" name="nombre" placeholder="Nueva tarea" required>
                                <input type="text" name="estado" placeholder="Nuevo estado" required>
                                <button>Update</button>
                            </form>
                        </div>

                        <div>
                            <form method="POST" action="/delete/{{ tarea[0] }}">
                                <button>Delete</button>
                            </form>
                        </div>
                    </td>

                </tr>


                {% endfor %}

            </tbody>
        </table>




    </ul>


</body>

</html>
